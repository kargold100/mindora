<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1B1B2F">
<meta name="robots" content="noindex, nofollow">
<title>Mindora — Admin</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Credential gate. See js/admin-login.js for an important note on
       what this does and doesn't protect against on a static site. -->
  <div id="adminLoginGate" class="profile-gate">
    <div class="profile-card">
      <div class="profile-brand">
        <span class="brand-mark brand-mark-pulse" aria-hidden="true"></span>
        <span class="brand-name">Mindora</span>
      </div>
      <p class="muted" data-i18n="admin_login_title">Admin login</p>

      <div id="adminLoginError" class="profile-error hidden" role="alert" aria-live="polite"></div>

      <form id="adminLoginForm" novalidate>
        <label class="field-label" for="adminUsernameInput" data-i18n="admin_login_username">Username</label>
        <input type="text" id="adminUsernameInput" autocomplete="username">

        <label class="field-label" for="adminPasswordInput" data-i18n="admin_login_password">Password</label>
        <input type="password" id="adminPasswordInput" autocomplete="current-password">

        <button type="submit" id="adminLoginBtn" class="btn-primary" style="margin-top:16px;" data-i18n="admin_login_btn">Log in</button>
      </form>
    </div>
  </div>

  <!-- Profile management, only shown after the credential check passes -->
  <div id="adminPanel" class="app-shell hidden">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">Mindora Admin</span>
      </div>
      <button id="adminLogoutBtn" class="btn-ghost" data-i18n="admin_logout">Log out</button>
    </header>

    <main id="screens" style="padding:8px 18px 40px;">
      <section class="screen active">
        <h2 data-i18n="admin_title">Manage profiles</h2>
        <p class="muted-inline" data-i18n="admin_note" style="display:block; margin-bottom:14px;">Names only — PINs are never shown here.</p>

        <div class="card">
          <div id="adminProfileList" class="activity-log"></div>

          <div class="admin-add-block">
            <p class="field-label" data-i18n="admin_add_title" style="margin-top:0;">Add a profile</p>
            <input type="text" id="adminNewName" data-i18n-placeholder="profile_name_label" placeholder="Name">
            <input type="password" id="adminNewPin" inputmode="numeric" pattern="[0-9]*" maxlength="8" data-i18n-placeholder="profile_pin_label" placeholder="PIN" style="margin-top:8px;">
            <div id="adminAddError" class="profile-error hidden" role="alert" aria-live="polite" style="margin-top:8px;"></div>
            <div class="form-actions">
              <button id="adminAddBtn" class="btn-secondary full" data-i18n="admin_add_btn">Add profile</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <p class="version-footer">Mindora v1.0 — Admin</p>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/profiles.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/admin-login.js"></script>
</body>
</html>

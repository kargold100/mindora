<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1B1B2F">
<meta name="robots" content="noindex, nofollow">
<title>Mindora — Admin</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* Admin-specific styles */
.admin-login-orb{
  width:64px; height:64px; border-radius:50%; margin:0 auto 16px;
  background:radial-gradient(circle at 35% 30%, var(--bloom), var(--dusk));
  animation:orbPulse 5s ease-in-out infinite;
  box-shadow:0 0 30px rgba(232,137,107,0.3);
}
.admin-topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 20px; background:var(--bg-card); border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:20;
}
.admin-brand{display:flex; align-items:center; gap:10px;}
.admin-brand-dot{
  width:12px; height:12px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, var(--bloom), var(--dusk));
}
.admin-brand-text{font-family:var(--font-display); font-weight:600; font-size:1rem;}
.admin-brand-badge{
  font-size:.64rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
  color:var(--bloom); background:rgba(232,137,107,0.12); border-radius:6px;
  padding:2px 6px;
}
.admin-content{max-width:520px; margin:0 auto; padding:20px 18px 60px;}
.admin-mode-card{
  background:rgba(107,111,158,0.1); border:1px solid rgba(107,111,158,0.2);
  border-radius:var(--radius-md); padding:12px 14px; margin-bottom:16px; font-size:.82rem;
  color:var(--text-muted); line-height:1.5;
}
.admin-mode-card strong{color:var(--dusk);}
.admin-pending-banner{
  background:rgba(232,137,107,0.1); border:1px solid var(--bloom-dim);
  border-radius:var(--radius-md); padding:10px 14px; margin-bottom:14px;
  font-size:.85rem; font-weight:600; color:var(--bloom); text-align:center;
}
.admin-list-header{
  display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;
}
.admin-list-title{font-weight:700; font-size:.88rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.04em;}
.admin-refresh-row{display:flex; align-items:center; gap:8px;}
.admin-refresh-time{font-size:.72rem; color:var(--text-muted);}
.admin-refresh-btn{
  background:var(--bg-card-2); border:1px solid var(--border); color:var(--text-muted);
  border-radius:999px; padding:5px 12px; font-size:.74rem; font-weight:600;
}
.admin-profile-row{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:12px 14px; background:var(--bg-card-2); border-radius:var(--radius-md);
  margin-bottom:8px; border:1px solid transparent; transition:border-color .2s;
}
.admin-profile-row.pending{border-color:rgba(232,137,107,0.3); background:rgba(232,137,107,0.05);}
.admin-profile-info{display:flex; flex-direction:column; gap:3px; min-width:0;}
.admin-profile-name{font-weight:600; font-size:.9rem;}
.admin-profile-actions{display:flex; align-items:center; gap:8px; flex-shrink:0;}
.btn-approve{
  background:var(--moss); color:#fff; border:none; border-radius:999px;
  padding:7px 14px; font-size:.78rem; font-weight:700; transition:transform .1s ease;
}
.btn-approve:hover{filter:brightness(1.1);}
.btn-approve:active{transform:scale(0.95);}
.btn-remove-profile{
  background:none; border:none; color:var(--text-muted); font-size:.95rem; padding:4px 6px;
  border-radius:6px; transition:color .15s;
}
.btn-remove-profile:hover{color:var(--bloom);}
.admin-add-section{margin-top:22px; padding-top:18px; border-top:1px solid var(--border);}
.admin-add-title{font-weight:700; font-size:.9rem; margin-bottom:12px;}
.admin-input-row{display:flex; gap:8px;}
.admin-input-row input{flex:1;}
.admin-loading{color:var(--text-muted); font-size:.85rem; padding:16px; text-align:center;}
.admin-badge.pending{background:rgba(232,137,107,0.15); color:var(--bloom);}
.admin-badge.approved{background:rgba(124,152,133,0.15); color:var(--moss);}
</style>
</head>
<body>

  <!-- ============ LOGIN GATE ============ -->
  <div id="adminLoginGate" class="profile-gate">
    <div class="profile-card">
      <div style="display:flex;justify-content:center;margin-bottom:12px;">
        <span style="display:block;width:64px;height:64px;" class="brand-mark-pulse">
          <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" width="64" height="64">
            <defs>
              <linearGradient id="ag1" x1="5%" y1="5%" x2="95%" y2="95%">
                <stop offset="0%" stop-color="#C87B68"/>
                <stop offset="100%" stop-color="#6568A8"/>
              </linearGradient>
              <radialGradient id="ag2" cx="40%" cy="35%" r="65%">
                <stop offset="0%" stop-color="#C87B68" stop-opacity="0.2"/>
                <stop offset="100%" stop-color="#6568A8" stop-opacity="0.08"/>
              </radialGradient>
            </defs>
            <circle cx="24" cy="24" r="23" fill="url(#ag2)"/>
            <circle cx="24" cy="24" r="23" fill="none" stroke="url(#ag1)" stroke-width="0.7" opacity="0.4"/>
            <ellipse cx="24" cy="14" rx="3.8" ry="9" fill="url(#ag1)" opacity="0.42" transform="rotate(30,24,24)"/>
            <ellipse cx="24" cy="14" rx="3.8" ry="9" fill="url(#ag1)" opacity="0.42" transform="rotate(150,24,24)"/>
            <ellipse cx="24" cy="14" rx="3.8" ry="9" fill="url(#ag1)" opacity="0.42" transform="rotate(270,24,24)"/>
            <ellipse cx="24" cy="14" rx="4.2" ry="9.5" fill="url(#ag1)" opacity="0.88" transform="rotate(0,24,24)"/>
            <ellipse cx="24" cy="14" rx="4.2" ry="9.5" fill="url(#ag1)" opacity="0.88" transform="rotate(120,24,24)"/>
            <ellipse cx="24" cy="14" rx="4.2" ry="9.5" fill="url(#ag1)" opacity="0.88" transform="rotate(240,24,24)"/>
            <circle cx="24" cy="24" r="5.8" fill="url(#ag1)"/>
            <circle cx="22.6" cy="22.6" r="2.2" fill="white" opacity="0.48"/>
          </svg>
        </span>
      </div>
      <h2 class="brand-name" style="text-align:center; margin-bottom:4px;">Mindora</h2>
      <p class="muted" style="text-align:center; margin-bottom:20px;" data-i18n="admin_login_title">Admin</p>

      <div id="adminLoginError" class="profile-error hidden" role="alert" aria-live="polite"></div>

      <form id="adminLoginForm" novalidate>
        <label class="field-label" for="adminUsernameInput" data-i18n="admin_login_username">Username</label>
        <input type="text" id="adminUsernameInput" autocomplete="username" spellcheck="false">
        <label class="field-label" for="adminPasswordInput" data-i18n="admin_login_password">Password</label>
        <input type="password" id="adminPasswordInput" autocomplete="current-password">
        <button type="submit" id="adminLoginBtn" class="btn-primary" style="margin-top:18px;" data-i18n="admin_login_btn">Log in</button>
      </form>
    </div>
  </div>

  <!-- ============ ADMIN PANEL ============ -->
  <div id="adminPanel" class="hidden" style="min-height:100vh; background:var(--bg);">
    <header class="admin-topbar">
      <div class="admin-brand">
        <span class="admin-brand-dot" aria-hidden="true"></span>
        <span class="admin-brand-text">Mindora</span>
        <span class="admin-brand-badge">Admin</span>
      </div>
      <button id="adminLogoutBtn" class="btn-ghost" style="padding:8px 16px; font-size:.82rem;" data-i18n="admin_logout">Log out</button>
    </header>

    <div class="admin-content">

      <!-- Mode note -->
      <div id="adminModeCard" class="admin-mode-card">
        <strong id="adminModeBadge">●</strong>
        <span id="adminModeText" data-i18n="admin_local_mode_note"></span>
      </div>

      <!-- Pending banner -->
      <div id="adminPendingBanner" class="admin-pending-banner hidden"></div>

      <!-- Profile list -->
      <div class="admin-list-header">
        <span class="admin-list-title" data-i18n="admin_title">Manage profiles</span>
        <div class="admin-refresh-row">
          <span class="admin-refresh-time" id="adminRefreshTime"></span>
          <button id="adminRefreshBtn" class="admin-refresh-btn" data-i18n="admin_refresh_btn">Refresh</button>
        </div>
      </div>
      <p class="muted-inline" data-i18n="admin_note" style="display:block; margin-bottom:12px;"></p>
      <div id="adminProfileList"></div>

      <!-- Add profile -->
      <div class="admin-add-section">
        <p class="admin-add-title" data-i18n="admin_add_title">Add a profile</p>
        <div class="admin-input-row">
          <input type="text" id="adminNewName" data-i18n-placeholder="profile_name_label" placeholder="Name">
          <input type="password" id="adminNewPin" inputmode="numeric" pattern="[0-9]*" maxlength="8" data-i18n-placeholder="profile_pin_label" placeholder="PIN">
        </div>
        <div id="adminAddError" class="profile-error hidden" role="alert" aria-live="polite" style="margin-top:8px;"></div>
        <div class="form-actions">
          <button id="adminAddBtn" class="btn-primary" data-i18n="admin_add_btn">Add profile</button>
        </div>
      </div>

    </div>
    <p class="version-footer" style="padding-bottom:20px;">Mindora v1.0 — Admin</p>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/profiles.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/admin-login.js"></script>
</body>
</html>

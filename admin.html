<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#12111E">
<meta name="robots" content="noindex, nofollow">
<title>Mindora — Admin</title>
<link rel="icon" href="logo.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/style.css?v=20260701">
<style>
/* ── Admin-specific styles ── */
.admin-page{ min-height:100vh; min-height:100dvh; background:var(--bg); }

.admin-login-outer{
  min-height:100vh; min-height:100dvh;
  display:flex; align-items:center; justify-content:center;
  padding:24px 18px;
  background:
    radial-gradient(ellipse 900px 700px at 20% -5%, rgba(101,104,168,0.2), transparent 55%),
    radial-gradient(ellipse 700px 600px at 88% 108%, rgba(200,123,104,0.16), transparent 55%),
    var(--bg);
}
.admin-login-card{
  width:100%; max-width:340px;
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--r-xl); padding:30px 24px 26px;
  box-shadow:var(--shadow-lg);
}
.admin-login-logo{
  display:flex; justify-content:center; margin-bottom:12px;
}
.admin-login-logo svg{ width:60px; height:60px; }
.admin-login-title{
  font-family:var(--font-serif); font-weight:600; font-size:1.2rem;
  text-align:center; margin-bottom:2px;
}
.admin-login-sub{ text-align:center; color:var(--text-muted); font-size:.84rem; margin-bottom:20px; }

.admin-topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px 8px;
  background:var(--bg-card); border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:20;
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
}
.admin-brand{ display:flex; align-items:center; gap:9px; }
.admin-brand-name{ font-family:var(--font-serif); font-weight:600; font-size:1rem; }
.admin-badge-pill{
  font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
  color:var(--bloom); background:var(--bloom-faint); border-radius:6px; padding:2px 7px;
}

.admin-body{ max-width:540px; margin:0 auto; padding:20px 16px 60px; }

.admin-mode-card{
  display:flex; gap:8px; align-items:flex-start;
  background:rgba(101,104,168,0.08); border:1px solid rgba(101,104,168,0.18);
  border-radius:var(--r-md); padding:12px 14px; margin-bottom:14px;
  font-size:.82rem; color:var(--text-muted); line-height:1.5;
}
.admin-mode-icon{ flex-shrink:0; margin-top:1px; }

.admin-pending-banner{
  text-align:center; padding:10px 14px; margin-bottom:12px;
  background:var(--bloom-faint); border:1px solid rgba(200,123,104,0.25);
  border-radius:var(--r-md); font-weight:600; font-size:.84rem; color:var(--bloom);
}

.admin-section-header{
  display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;
}
.admin-section-title{
  font-size:.72rem; font-weight:700; text-transform:uppercase;
  letter-spacing:.07em; color:var(--text-faint);
}
.admin-refresh-row{ display:flex; align-items:center; gap:8px; }
.admin-refresh-time{ font-size:.7rem; color:var(--text-faint); font-family:var(--font-mono); }
.admin-refresh-btn{
  font-size:.74rem; font-weight:600; padding:5px 12px;
  background:var(--bg-card-2); border:1px solid var(--border-2); color:var(--text-muted);
  border-radius:999px;
}

.admin-profile-row{
  display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
  padding:12px 14px; background:var(--bg-card-2); border-radius:var(--r-md);
  margin-bottom:8px; border:1px solid transparent;
  transition:border-color .2s ease;
}
.admin-profile-row.pending{ border-color:rgba(200,123,104,0.3); background:rgba(200,123,104,0.05); }
.admin-profile-row.locked{  border-color:rgba(101,104,168,0.3); background:rgba(101,104,168,0.05); }
.admin-profile-info{ display:flex; flex-direction:column; gap:4px; min-width:0; }
.admin-profile-name{ font-weight:600; font-size:.88rem; }
.admin-profile-actions{ display:flex; align-items:center; gap:6px; flex-shrink:0; flex-wrap:wrap; justify-content:flex-end; }

.admin-action-btn{
  font-size:.72rem; font-weight:600; padding:6px 10px; border-radius:999px;
  border:1px solid var(--border-2); background:var(--bg-card);
  color:var(--text-muted); transition:all .15s ease;
}
.admin-action-btn:hover{ background:var(--bg-chip); color:var(--text); }
.admin-action-btn.approve-btn{ color:var(--moss); border-color:rgba(110,140,123,0.4); background:var(--moss-faint); }
.admin-action-btn.lock-btn{    color:var(--bloom); border-color:rgba(200,123,104,0.35); }
.admin-action-btn.unlock-btn{  color:var(--dusk);  border-color:rgba(101,104,168,0.35); }
.admin-action-btn.pin-btn{     color:var(--text-muted); }
.admin-action-btn.remove-btn{  color:var(--text-faint); font-weight:400; }
.admin-action-btn.remove-btn:hover{ color:var(--bloom); }

.admin-empty-state{
  padding:20px; background:var(--bg-card-2); border-radius:var(--r-md);
  font-size:.84rem; color:var(--text-muted); line-height:1.6;
}
.admin-diag-box{
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--r-sm); padding:10px 12px;
}

.admin-section-card{
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--r-xl); padding:16px; margin-bottom:12px;
}
.admin-section-card h3{ font-size:.94rem; margin-bottom:12px; }
.admin-input-row{ display:flex; gap:8px; }
.admin-input-row input{ flex:1; }

.admin-global-error{
  background:var(--bloom-faint); border:1px solid rgba(200,123,104,0.3);
  color:var(--bloom); border-radius:var(--r-md); padding:10px 12px;
  font-size:.83rem; margin-bottom:12px;
}
.admin-success{
  background:var(--moss-faint); border:1px solid rgba(110,140,123,0.3);
  color:var(--moss); border-radius:var(--r-md); padding:9px 12px;
  font-size:.83rem; margin-top:8px;
}
.admin-conn-result{
  display:block; font-size:.82rem; margin-top:8px; font-weight:600;
}

.admin-badge.locked{ background:rgba(101,104,168,0.15); color:var(--dusk); }
</style>
</head>
<body class="admin-page">

  <!-- ══ Login gate ══════════════════════════════════ -->
  <div id="adminLoginGate" class="admin-login-outer">
    <div class="admin-login-card">
      <div class="admin-login-logo">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lg1" x1="5%" y1="5%" x2="95%" y2="95%">
              <stop offset="0%" stop-color="#C87B68"/><stop offset="100%" stop-color="#6568A8"/>
            </linearGradient>
            <radialGradient id="lg2" cx="40%" cy="35%" r="65%">
              <stop offset="0%" stop-color="#C87B68" stop-opacity="0.22"/>
              <stop offset="100%" stop-color="#6568A8" stop-opacity="0.1"/>
            </radialGradient>
          </defs>
          <circle cx="24" cy="24" r="23" fill="url(#lg2)"/>
          <circle cx="24" cy="24" r="23" fill="none" stroke="url(#lg1)" stroke-width="0.7" opacity="0.4"/>
          <ellipse cx="24" cy="14" rx="3.8" ry="9" fill="url(#lg1)" opacity="0.42" transform="rotate(30,24,24)"/>
          <ellipse cx="24" cy="14" rx="3.8" ry="9" fill="url(#lg1)" opacity="0.42" transform="rotate(150,24,24)"/>
          <ellipse cx="24" cy="14" rx="3.8" ry="9" fill="url(#lg1)" opacity="0.42" transform="rotate(270,24,24)"/>
          <ellipse cx="24" cy="14" rx="4.2" ry="9.5" fill="url(#lg1)" opacity="0.88" transform="rotate(0,24,24)"/>
          <ellipse cx="24" cy="14" rx="4.2" ry="9.5" fill="url(#lg1)" opacity="0.88" transform="rotate(120,24,24)"/>
          <ellipse cx="24" cy="14" rx="4.2" ry="9.5" fill="url(#lg1)" opacity="0.88" transform="rotate(240,24,24)"/>
          <circle cx="24" cy="24" r="5.8" fill="url(#lg1)"/>
          <circle cx="22.6" cy="22.6" r="2.2" fill="white" opacity="0.48"/>
        </svg>
      </div>
      <h2 class="admin-login-title">Mindora</h2>
      <p class="admin-login-sub" data-i18n="admin_login_title">Admin</p>
      <div id="adminLoginError" class="profile-error hidden" role="alert" aria-live="polite"></div>
      <form id="adminLoginForm" novalidate>
        <label class="field-label" for="adminUsernameInput" data-i18n="admin_login_username">Username</label>
        <input type="text" id="adminUsernameInput" autocomplete="username" spellcheck="false">
        <label class="field-label" for="adminPasswordInput" data-i18n="admin_login_password">Password</label>
        <input type="password" id="adminPasswordInput" autocomplete="current-password">
        <button type="submit" id="adminLoginBtn" class="btn-primary" style="margin-top:18px;" data-i18n="admin_login_btn">Log in</button>
      </form>
    </div>
  </div>

  <!-- ══ Admin panel ═════════════════════════════════ -->
  <div id="adminPanel" class="hidden">
    <header class="admin-topbar">
      <div class="admin-brand">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" width="28" height="28">
          <defs>
            <linearGradient id="tg" x1="5%" y1="5%" x2="95%" y2="95%">
              <stop offset="0%" stop-color="#C87B68"/><stop offset="100%" stop-color="#6568A8"/>
            </linearGradient>
          </defs>
          <ellipse cx="24" cy="14" rx="3.8" ry="9" fill="url(#tg)" opacity="0.42" transform="rotate(30,24,24)"/>
          <ellipse cx="24" cy="14" rx="3.8" ry="9" fill="url(#tg)" opacity="0.42" transform="rotate(150,24,24)"/>
          <ellipse cx="24" cy="14" rx="3.8" ry="9" fill="url(#tg)" opacity="0.42" transform="rotate(270,24,24)"/>
          <ellipse cx="24" cy="14" rx="4.2" ry="9.5" fill="url(#tg)" opacity="0.88" transform="rotate(0,24,24)"/>
          <ellipse cx="24" cy="14" rx="4.2" ry="9.5" fill="url(#tg)" opacity="0.88" transform="rotate(120,24,24)"/>
          <ellipse cx="24" cy="14" rx="4.2" ry="9.5" fill="url(#tg)" opacity="0.88" transform="rotate(240,24,24)"/>
          <circle cx="24" cy="24" r="5.8" fill="url(#tg)"/>
        </svg>
        <span class="admin-brand-name">Mindora</span>
        <span class="admin-badge-pill">Admin</span>
      </div>
      <button id="adminLogoutBtn" class="btn-ghost" style="padding:7px 14px; font-size:.82rem;" data-i18n="admin_logout">Log out</button>
    </header>

    <div class="admin-body">

      <!-- Mode card -->
      <div id="adminModeCard" class="admin-mode-card">
        <span class="admin-mode-icon" id="adminModeBadge">●</span>
        <span id="adminModeText" data-i18n="admin_local_mode_note"></span>
      </div>

      <!-- Global error -->
      <div id="adminGlobalError" class="admin-global-error hidden" role="alert"></div>

      <!-- Pending banner -->
      <div id="adminPendingBanner" class="admin-pending-banner hidden"></div>

      <!-- ── Profiles section ── -->
      <div class="admin-section-header">
        <span class="admin-section-title" data-i18n="admin_section_profiles">Profiles</span>
        <div class="admin-refresh-row">
          <span class="admin-refresh-time" id="adminRefreshTime"></span>
          <button id="adminRefreshBtn" class="admin-refresh-btn" data-i18n="admin_refresh_btn">Refresh</button>
        </div>
      </div>
      <p class="muted-inline" data-i18n="admin_note" style="display:block; margin-bottom:10px;"></p>
      <div id="adminProfileList"></div>

      <!-- Add profile -->
      <div class="admin-section-card" style="margin-top:16px;">
        <h3 data-i18n="admin_add_title">Add a profile</h3>
        <div class="admin-input-row">
          <input type="text" id="adminNewName" data-i18n-placeholder="profile_name_label" placeholder="Name">
          <input type="password" id="adminNewPin" inputmode="numeric" pattern="[0-9]*" maxlength="8" data-i18n-placeholder="profile_pin_label" placeholder="PIN">
        </div>
        <div id="adminAddError" class="profile-error hidden" style="margin-top:8px;" role="alert" aria-live="polite"></div>
        <div class="form-actions">
          <button id="adminAddBtn" class="btn-primary" data-i18n="admin_add_btn">Add profile</button>
        </div>
      </div>

      <!-- ── Security section ── -->
      <div class="admin-section-header" style="margin-top:22px;">
        <span class="admin-section-title" data-i18n="admin_section_security">Security</span>
      </div>

      <!-- Test connection -->
      <div class="admin-section-card">
        <h3 data-i18n="admin_test_connection">Test connection</h3>
        <button id="adminTestConnBtn" class="btn-secondary full" data-i18n="admin_test_connection">Test connection</button>
        <span id="adminConnResult" class="admin-conn-result hidden"></span>
      </div>

      <!-- Change admin password -->
      <div class="admin-section-card">
        <h3 data-i18n="admin_change_password">Change admin password</h3>
        <label class="field-label" for="adminCurrentPwd" data-i18n="admin_current_password">Current password</label>
        <input type="password" id="adminCurrentPwd" autocomplete="current-password">
        <label class="field-label" for="adminNewPwd" data-i18n="admin_new_password">New password</label>
        <input type="password" id="adminNewPwd" autocomplete="new-password">
        <label class="field-label" for="adminConfirmPwd" data-i18n="admin_confirm_password">Confirm new password</label>
        <input type="password" id="adminConfirmPwd" autocomplete="new-password">
        <div id="adminPwdError" class="profile-error hidden" style="margin-top:8px;" role="alert"></div>
        <div id="adminPwdOk" class="admin-success hidden"></div>
        <div class="form-actions">
          <button id="adminChangePwdBtn" class="btn-secondary full" data-i18n="admin_change_password">Change password</button>
        </div>
        <p class="muted-inline" style="display:block; margin-top:10px;">Password is stored as a SHA-256 hash in your browser — not sent anywhere. You'll need to update admin-login.js if you move to a new device.</p>
      </div>

    </div>
    <p class="version-footer" style="padding-bottom:20px;">Mindora v1.0 — Admin</p>
  </div>

  <script src="js/i18n.js?v=20260701"></script>
  <script src="js/modal.js?v=20260701"></script>
  <script src="js/config.js?v=20260701"></script>
  <script src="js/api.js?v=20260701"></script>
  <script src="js/storage.js?v=20260701"></script>
  <script src="js/profiles.js?v=20260701"></script>
  <script src="js/admin.js?v=20260701"></script>
  <script src="js/admin-login.js?v=20260701"></script>
</body>
</html>
